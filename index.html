<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#141418"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>LIFTIQ — Program</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:       #141418;
  --surface:  #1a1a20;
  --raised:   #202028;
  --inset:    #101014;
  --border:   rgba(255,255,255,0.06);
  --shadow-dark:  rgba(0,0,0,0.6);
  --shadow-light: rgba(255,255,255,0.04);
  --volt:     #e8ff47;
  --volt-dim: rgba(232,255,71,0.12);
  --teal:     #00e5c8;
  --teal-dim: rgba(0,229,200,0.1);
  --danger:   #ff4d4d;
  --amber:    #ffb830;
  --muted:    #55576a;
  --text:     #d8dae8;
  --text-dim: #6b6e84;
  --fb: 'DM Sans', sans-serif;
  --fm: 'DM Mono', monospace;
  --sb: env(safe-area-inset-bottom, 0px);
  --r: 20px;   /* base border radius */
  --r-sm: 12px;
  --r-lg: 28px;
}

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--fb);
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

/* ── Neumorphic mixins ───────────────────────── */
.neu {
  background: var(--surface);
  border-radius: var(--r);
  box-shadow:
    6px 6px 16px var(--shadow-dark),
    -2px -2px 8px var(--shadow-light);
}
.neu-inset {
  background: var(--inset);
  border-radius: var(--r-sm);
  box-shadow:
    inset 3px 3px 8px var(--shadow-dark),
    inset -1px -1px 4px var(--shadow-light);
}
.neu-sm {
  background: var(--surface);
  border-radius: var(--r-sm);
  box-shadow:
    4px 4px 10px var(--shadow-dark),
    -1px -1px 5px var(--shadow-light);
}
.neu-pill {
  background: var(--surface);
  border-radius: 50px;
  box-shadow:
    4px 4px 10px var(--shadow-dark),
    -1px -1px 5px var(--shadow-light);
}

/* ── NAV ─────────────────────────────────────── */
#nav {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg);
  padding: 14px 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
#nav-logo {
  font-family: var(--fm);
  font-weight: 500;
  font-size: 17px;
  letter-spacing: 0.12em;
  color: var(--volt);
}
#nav-logo span { color: var(--text-dim); }

#nav-tabs {
  display: flex;
  gap: 4px;
  padding: 4px;
  border-radius: 50px;
  background: var(--inset);
  box-shadow: inset 2px 2px 6px var(--shadow-dark), inset -1px -1px 3px var(--shadow-light);
}
.nav-tab {
  background: none;
  border: none;
  color: var(--muted);
  font-family: var(--fb);
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.nav-tab.active {
  background: var(--surface);
  color: var(--volt);
  box-shadow: 3px 3px 8px var(--shadow-dark), -1px -1px 4px var(--shadow-light);
}

/* ── PAGES ──────────────────────────────────── */
.page { display: none; padding: 8px 16px calc(90px + var(--sb)); }
.page.active { display: block; }

/* ── SECTION LABEL ───────────────────────────── */
.sec-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin: 20px 0 10px;
}

/* ── UNIT ROW ─────────────────────────────────── */
.unit-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.unit-pill {
  display: flex;
  padding: 3px;
  border-radius: 50px;
  background: var(--inset);
  box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -1px -1px 3px var(--shadow-light);
}
.unit-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-family: var(--fm);
  font-size: 12px;
  font-weight: 500;
  padding: 5px 14px;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.2s;
}
.unit-btn.active {
  background: var(--volt);
  color: #000;
  box-shadow: 2px 2px 6px var(--shadow-dark);
}
.bw-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: auto;
  padding: 5px 12px;
  border-radius: 50px;
  background: var(--inset);
  box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -1px -1px 3px var(--shadow-light);
}
.bw-wrap input {
  background: none;
  border: none;
  color: var(--text);
  font-family: var(--fm);
  font-size: 13px;
  width: 60px;
  outline: none;
  text-align: right;
}
.bw-wrap input::placeholder { color: var(--muted); }
.bw-unit { font-size: 11px; color: var(--muted); }

/* ── LIFT CARDS ───────────────────────────────── */
.lift-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.lift-card {
  padding: 14px;
  border-radius: var(--r);
  background: var(--surface);
  box-shadow: 6px 6px 14px var(--shadow-dark), -2px -2px 6px var(--shadow-light);
  position: relative;
  overflow: hidden;
}
.lift-card::before {
  content: attr(data-lift);
  position: absolute;
  right: 10px; top: 8px;
  font-family: var(--fm);
  font-size: 32px;
  font-weight: 500;
  color: rgba(255,255,255,0.03);
  letter-spacing: -0.02em;
}
.lift-name {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.lift-val-row { display: flex; align-items: baseline; gap: 6px; }
.lift-input {
  background: none;
  border: none;
  color: var(--text);
  font-family: var(--fm);
  font-size: 22px;
  font-weight: 500;
  outline: none;
  width: 100%;
  min-width: 0;
}
.lift-input::placeholder { color: var(--muted); font-size: 18px; }
.lift-unit-label { font-size: 11px; color: var(--muted); flex-shrink: 0; }
.lift-alt { font-size: 10px; color: var(--muted); margin-top: 4px; font-family: var(--fm); }
.lift-bar { height: 3px; background: var(--inset); border-radius: 2px; margin-top: 10px; overflow: hidden; box-shadow: inset 1px 1px 3px var(--shadow-dark); }
.lift-bar-fill { height: 100%; background: var(--volt); border-radius: 2px; transition: width 0.5s; }
.lift-pct { font-size: 10px; color: var(--muted); margin-top: 4px; font-family: var(--fm); }

/* ── TOTALS CARD ─────────────────────────────── */
.totals-card {
  margin-top: 12px;
  padding: 16px;
  border-radius: var(--r);
  background: var(--surface);
  box-shadow: 6px 6px 14px var(--shadow-dark), -2px -2px 6px var(--shadow-light);
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
}
.total-item .total-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.total-item .total-val { font-family: var(--fm); font-size: 20px; font-weight: 500; }

/* ── PROGRAM PAGE ─────────────────────────────── */
#prog-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}
.prog-name-input {
  flex: 1;
  background: none;
  border: none;
  color: var(--text);
  font-family: var(--fb);
  font-size: 18px;
  font-weight: 500;
  outline: none;
  min-width: 0;
}
.prog-name-input::placeholder { color: var(--muted); }
.icon-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--surface);
  color: var(--text-dim);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 3px 3px 8px var(--shadow-dark), -1px -1px 4px var(--shadow-light);
  transition: color 0.2s;
  flex-shrink: 0;
}
.icon-btn:hover { color: var(--volt); }
.icon-btn.danger:hover { color: var(--danger); }

/* ── WEEK BLOCK ───────────────────────────────── */
.week-block { margin-bottom: 20px; }
.week-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  padding: 10px 14px;
  border-radius: var(--r-lg);
  background: var(--inset);
  box-shadow: inset 3px 3px 8px var(--shadow-dark), inset -1px -1px 4px var(--shadow-light);
}
.week-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--amber);
  flex: 1;
}
.week-date {
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: var(--fm);
  font-size: 11px;
  outline: none;
  max-width: 120px;
}
.week-date:focus { color: var(--text); }
.check-btn {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: none;
  background: var(--surface);
  color: transparent;
  font-size: 12px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 3px 3px 7px var(--shadow-dark), -1px -1px 3px var(--shadow-light);
  transition: all 0.2s;
  flex-shrink: 0;
}
.check-btn.checked { background: var(--volt); color: #000; box-shadow: none; }
.mini-btn {
  background: var(--surface);
  border: none;
  color: var(--text-dim);
  font-family: var(--fm);
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 2px 2px 6px var(--shadow-dark), -1px -1px 3px var(--shadow-light);
  transition: color 0.2s;
  white-space: nowrap;
}
.mini-btn:hover { color: var(--teal); }
.mini-btn.danger:hover { color: var(--danger); }

/* ── DAY CARD ─────────────────────────────────── */
.day-card {
  margin-bottom: 10px;
  border-radius: var(--r);
  background: var(--surface);
  box-shadow: 6px 6px 14px var(--shadow-dark), -2px -2px 6px var(--shadow-light);
  overflow: hidden;
}
.day-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 14px;
}
.day-label {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}
.day-date {
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: var(--fm);
  font-size: 11px;
  outline: none;
  max-width: 110px;
}
.day-date:focus { color: var(--text); }
.cam-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: none;
  background: var(--raised);
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.2s;
  flex-shrink: 0;
}
.cam-btn:hover { color: var(--teal); }

/* ── EXERCISE TABLE ──────────────────────────── */
.ex-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.ex-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 440px;
}
.ex-table thead th {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 6px 8px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
.ex-table thead th.c { text-align: center; }
.ex-table tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.ex-table tbody tr:last-child { border-bottom: none; }
.ex-table tbody tr:hover { background: rgba(255,255,255,0.015); }
.ex-table td { padding: 5px 6px; vertical-align: middle; }

.ex-in {
  background: none;
  border: none;
  color: var(--text);
  font-family: var(--fb);
  font-size: 13px;
  outline: none;
  width: 100%;
  padding: 3px 4px;
  border-radius: 6px;
  transition: background 0.15s;
}
.ex-in:focus { background: var(--raised); }
.ex-in.mono {
  font-family: var(--fm);
  font-size: 12px;
  text-align: center;
  color: var(--text-dim);
}
.ex-in.mono:focus { color: var(--text); }
.ex-in::placeholder { color: var(--muted); }

.weight-val {
  font-family: var(--fm);
  font-size: 12px;
  color: var(--volt);
  text-align: center;
  line-height: 1.2;
}
.weight-alt {
  font-size: 9px;
  color: var(--muted);
  text-align: center;
}
.row-num {
  font-family: var(--fm);
  font-size: 10px;
  color: var(--muted);
  text-align: center;
  padding: 0 6px;
}
.del-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 4px;
  transition: color 0.15s;
  display: block;
  margin: 0 auto;
}
.del-btn:hover { color: var(--danger); }

/* ── ADD EX BTN ─────────────────────────────── */
.add-ex-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 10px;
  background: none;
  border: none;
  color: var(--muted);
  font-family: var(--fb);
  font-size: 12px;
  cursor: pointer;
  border-top: 1px solid var(--border);
  transition: color 0.15s;
}
.add-ex-btn:hover { color: var(--volt); }

/* ── MEDIA PREVIEW ───────────────────────────── */
.media-strip {
  display: flex;
  gap: 6px;
  padding: 0 14px 10px;
  flex-wrap: wrap;
}
.media-thumb {
  width: 52px; height: 52px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 3px 3px 8px var(--shadow-dark);
}

/* ── AUTOCOMPLETE ────────────────────────────── */
.ac-wrap { position: relative; }
.ac-list {
  position: absolute;
  top: calc(100% + 4px);
  left: -8px;
  right: -8px;
  background: var(--raised);
  border-radius: var(--r-sm);
  z-index: 100;
  max-height: 180px;
  overflow-y: auto;
  box-shadow: 8px 8px 20px var(--shadow-dark), -2px -2px 8px var(--shadow-light);
  display: none;
}
.ac-item {
  padding: 9px 14px;
  font-size: 13px;
  cursor: pointer;
  color: var(--text-dim);
  transition: background 0.1s, color 0.1s;
}
.ac-item:hover, .ac-item.sel {
  background: var(--volt-dim);
  color: var(--volt);
}

/* ── RPE PAGE ────────────────────────────────── */
.rpe-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 16px; }
.rpe-tbl {
  border-collapse: collapse;
  font-family: var(--fm);
  font-size: 11px;
  min-width: 380px;
  width: 100%;
}
.rpe-tbl th {
  padding: 7px 6px;
  text-align: center;
  color: var(--muted);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
}
.rpe-tbl th:first-child {
  position: sticky; left: 0; z-index: 2;
  background: var(--surface); text-align: left; padding-left: 10px;
}
.rpe-tbl td {
  padding: 6px;
  text-align: center;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
}
.rpe-tbl td:first-child {
  background: var(--raised);
  color: var(--amber);
  font-weight: 500;
  position: sticky; left: 0;
  padding-left: 10px; text-align: left;
}
.rpe-tbl tr:last-child td { border-bottom: none; }

.calc-card {
  padding: 18px;
  border-radius: var(--r);
  background: var(--surface);
  box-shadow: 6px 6px 14px var(--shadow-dark), -2px -2px 6px var(--shadow-light);
}
.calc-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.calc-field label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 5px; }
.calc-inset {
  padding: 8px 10px;
  border-radius: var(--r-sm);
  background: var(--inset);
  box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -1px -1px 3px var(--shadow-light);
}
.calc-inset input, .calc-inset select {
  background: none;
  border: none;
  color: var(--text);
  font-family: var(--fm);
  font-size: 14px;
  outline: none;
  width: 100%;
}
.calc-inset select option { background: var(--raised); }
.calc-result {
  text-align: center;
  padding: 14px;
  border-radius: var(--r-sm);
  background: var(--volt-dim);
}
.calc-result-val {
  font-family: var(--fm);
  font-size: 32px;
  font-weight: 500;
  color: var(--volt);
}
.calc-result-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── HISTORY PAGE ───────────────────────────── */
.hist-card {
  padding: 14px;
  border-radius: var(--r);
  background: var(--surface);
  box-shadow: 5px 5px 12px var(--shadow-dark), -1px -1px 5px var(--shadow-light);
  margin-bottom: 10px;
}
.hist-hdr { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.hist-title { font-size: 14px; font-weight: 500; color: var(--text); }
.hist-date { font-family: var(--fm); font-size: 10px; color: var(--muted); }
.hist-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.hist-chip {
  padding: 3px 8px;
  border-radius: 50px;
  background: var(--raised);
  font-family: var(--fm);
  font-size: 10px;
  color: var(--text-dim);
  box-shadow: 2px 2px 5px var(--shadow-dark);
}

/* ── FAB ────────────────────────────────────── */
#fab {
  position: fixed;
  bottom: calc(20px + var(--sb));
  right: 16px;
  background: var(--volt);
  color: #000;
  border: none;
  border-radius: 50px;
  font-family: var(--fm);
  font-size: 13px;
  font-weight: 500;
  padding: 13px 22px;
  cursor: pointer;
  box-shadow: 5px 5px 14px rgba(0,0,0,0.5), 0 0 20px rgba(232,255,71,0.15);
  z-index: 40;
  transition: transform 0.15s, box-shadow 0.15s;
}
#fab:active { transform: scale(0.96); }

/* ── TOAST ──────────────────────────────────── */
#toast {
  position: fixed;
  bottom: calc(78px + var(--sb));
  left: 50%;
  transform: translateX(-50%) translateY(30px);
  background: var(--raised);
  color: var(--text);
  font-size: 12px;
  padding: 9px 16px;
  border-radius: 50px;
  box-shadow: 5px 5px 14px var(--shadow-dark);
  opacity: 0;
  transition: transform 0.25s, opacity 0.25s;
  white-space: nowrap;
  pointer-events: none;
  z-index: 200;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── SCROLLBAR ──────────────────────────────── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--raised); border-radius: 2px; }
</style>
</head>
<body>

<nav id="nav">
  <div id="nav-logo">LIFT<span>IQ</span></div>
  <div id="nav-tabs">
    <button class="nav-tab active" data-page="progress">Stats</button>
    <button class="nav-tab" data-page="program">Program</button>
    <button class="nav-tab" data-page="rpe">RPE</button>
    <button class="nav-tab" data-page="history">Log</button>
  </div>
</nav>

<!-- STATS -->
<div class="page active" id="page-progress">
  <div class="unit-row">
    <div class="unit-pill">
      <button class="unit-btn active" data-unit="lb">lb</button>
      <button class="unit-btn" data-unit="kg">kg</button>
    </div>
    <div class="bw-wrap">
      <span class="bw-unit">BW</span>
      <input type="number" id="bw-input" placeholder="—" step="0.5"/>
      <span class="bw-unit" id="bw-unit-label">lb</span>
    </div>
  </div>

  <div class="sec-label">Current PRs</div>
  <div class="lift-grid" id="lift-grid-current"></div>

  <div class="sec-label">Targets</div>
  <div class="lift-grid" id="lift-grid-target"></div>

  <div class="totals-card" style="margin-top:12px">
    <div class="total-item">
      <div class="total-label">Total</div>
      <div class="total-val" id="current-total" style="color:var(--volt)">—</div>
    </div>
    <div class="total-item">
      <div class="total-label">Target</div>
      <div class="total-val" id="target-total" style="color:var(--amber)">—</div>
    </div>
    <div class="total-item">
      <div class="total-label">Dots</div>
      <div class="total-val" id="dots-val" style="color:var(--teal)">—</div>
    </div>
  </div>
</div>

<!-- PROGRAM -->
<div class="page" id="page-program">
  <div id="prog-top">
    <input class="prog-name-input" id="prog-title" value="My Program" placeholder="Program name"/>
    <button class="icon-btn" id="btn-add-week" title="Add week">＋</button>
    <button class="icon-btn danger" id="btn-minus-week" title="Remove week">−</button>
  </div>
  <div id="weeks-container"></div>
</div>

<!-- RPE -->
<div class="page" id="page-rpe">
  <div class="sec-label">RPE Scale — % of 1RM</div>
  <div class="rpe-scroll">
    <table class="rpe-tbl" id="rpe-tbl"></table>
  </div>
  <div class="calc-card">
    <div class="calc-grid">
      <div class="calc-field">
        <label>1RM</label>
        <div class="calc-inset"><input type="number" id="calc-1rm" placeholder="e.g. 270"/></div>
      </div>
      <div class="calc-field">
        <label>RPE</label>
        <div class="calc-inset">
          <select id="calc-rpe">
            <option>10</option><option>9.5</option><option selected>9</option>
            <option>8.5</option><option>8</option><option>7.5</option>
            <option>7</option><option>6.5</option><option>6</option>
          </select>
        </div>
      </div>
      <div class="calc-field">
        <label>Reps</label>
        <div class="calc-inset">
          <select id="calc-reps">
            <option>1</option><option>2</option><option>3</option><option>4</option>
            <option>5</option><option>6</option><option>7</option><option>8</option>
            <option>9</option><option>10</option>
          </select>
        </div>
      </div>
    </div>
    <div class="calc-result">
      <div class="calc-result-val"><span id="calc-res">—</span> <span id="calc-res-unit" style="font-size:16px;color:var(--muted)">lb</span></div>
      <div class="calc-result-label">Target weight</div>
    </div>
  </div>
</div>

<!-- LOG -->
<div class="page" id="page-history">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
    <div class="sec-label" style="margin:0">Workout Log</div>
    <button class="mini-btn danger" id="btn-clear-hist">Clear all</button>
  </div>
  <div id="history-list"></div>
</div>

<button id="fab">Save ↑</button>
<div id="toast"></div>
<input type="file" id="media-input" accept="image/*,video/*" capture="environment" style="display:none" multiple/>

<script>
// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
const RPE_SCALE = {
  10:  [1,0.955,0.922,0.892,0.863,0.837,0.811,0.786,0.762,0.739],
  9.5: [0.978,0.938,0.907,0.878,0.850,0.824,0.798,0.774,0.751,0.732],
  9:   [0.955,0.922,0.892,0.863,0.837,0.811,0.786,0.762,0.739,0.724],
  8.5: [0.938,0.907,0.878,0.850,0.824,0.798,0.774,0.751,0.732,0.716],
  8:   [0.922,0.892,0.863,0.837,0.811,0.786,0.762,0.739,0.724,0.707],
  7.5: [0.907,0.878,0.850,0.824,0.798,0.774,0.751,0.732,0.716,0.699],
  7:   [0.892,0.863,0.837,0.811,0.786,0.762,0.739,0.724,0.707,0.691],
  6.5: [0.878,0.850,0.824,0.798,0.774,0.751,0.732,0.716,0.699,0.683],
  6:   [0.863,0.837,0.811,0.786,0.762,0.739,0.724,0.707,0.691,0.676],
  5.5: [0.850,0.824,0.798,0.774,0.751,0.732,0.716,0.699,0.683,0.669],
  5:   [0.837,0.811,0.786,0.762,0.739,0.724,0.707,0.691,0.676,0.663],
};
const RPE_ROWS = [10,9.5,9,8.5,8,7.5,7,6.5,6,5.5,5];
const KG2LB = 2.2046;
const SAVE_KEY = 'liftiq_prog_v3';
const HIST_KEY = 'liftiq_hist_v3';
const LIFT_KEY = 'liftiq_lifts_v3';
const DAY_NAMES = ['Day 1  Mon','Day 2  Tue','Day 3  Wed','Day 4  Fri'];

let displayUnit = 'lb';
let lifts = {
  current:{SQ:595.242,BP:365,DL:585,OHP:155},
  target: {SQ:705,BP:405,DL:705,OHP:null},
  bw: 102*KG2LB, dots:411.35,
};
let programData = {title:'My Program', weeks:[]};
let activeMedia = null;

let exerciseNames = new Set([
  'Squat','Bench Press','Deadlift','OHP','Belt Squat','Larson Bench Press',
  'Romanian Deadlift','Single Leg RDL','Copenhagen Plank','Ab Wheel',
  'Cable Crunch','Cable Tricep Extension','Side Lateral Raise','Rear Delt Fly',
  'Machine Press','Sandbag Bear Hug Carry','Back Extension','BSS',
  'Pause Squat','Close Grip Bench','Incline Bench','Leg Press','Hip Thrust',
  'Good Morning','Face Pull','Tricep Pushdown','Bicep Curl',
  'Pause Deadlift','Deficit Deadlift','Box Squat','Front Squat',
]);

// ═══════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════
function saveAll(){
  localStorage.setItem(SAVE_KEY,JSON.stringify(programData));
  localStorage.setItem(LIFT_KEY,JSON.stringify({lifts,displayUnit}));
}
function loadAll(){
  try{const p=localStorage.getItem(SAVE_KEY);if(p)programData=JSON.parse(p);}catch{}
  try{const l=localStorage.getItem(LIFT_KEY);if(l){const d=JSON.parse(l);lifts=d.lifts;displayUnit=d.displayUnit||'lb';}}catch{}
}

// ═══════════════════════════════════════
// UNITS
// ═══════════════════════════════════════
function toDisplay(lb){return displayUnit==='lb'?lb:lb/KG2LB;}
function toLb(v){return displayUnit==='lb'?v:v*KG2LB;}
function fmt(lb,d=1){
  if(lb==null||isNaN(lb))return'—';
  return toDisplay(lb).toFixed(d)+' '+displayUnit;
}
function parseAsLb(v){const n=parseFloat(v);return isNaN(n)?null:toLb(n);}

// ═══════════════════════════════════════
// RPE CALC
// ═══════════════════════════════════════
const DEFAULT_TEMPOS={SQ:'311',BP:'111',DL:'101',OHP:'101'};
function tempoFactor(workout,tempo){
  if(!tempo||tempo.length<3)return 1;
  const pause=parseInt(tempo[1])||0;
  const ecc=parseInt(tempo[0])||0;
  const def=DEFAULT_TEMPOS[workout?.toUpperCase()]||'111';
  const defEcc=parseInt(def[0])||1;
  const extra=Math.max(0,ecc-defEcc);
  return Math.max(0.85,1-(pause*0.5+extra*0.3)*0.02);
}
function rpeFactor(rpe,reps){
  const row=RPE_SCALE[parseFloat(rpe)];
  if(!row)return null;
  return row[Math.min(parseInt(reps)-1,9)];
}
function calcWeight(orm,rpe,reps,tempo,workout){
  if(!orm||!rpe||!reps)return null;
  const f=rpeFactor(rpe,reps);
  return f?orm*f*tempoFactor(workout,tempo):null;
}

// ═══════════════════════════════════════
// STATS PAGE
// ═══════════════════════════════════════
function renderStats(){
  document.querySelectorAll('.unit-btn').forEach(b=>b.classList.toggle('active',b.dataset.unit===displayUnit));
  document.getElementById('bw-unit-label').textContent=displayUnit;
  const bwI=document.getElementById('bw-input');
  bwI.value=lifts.bw?toDisplay(lifts.bw).toFixed(1):'';
  renderLiftGrid('lift-grid-current','current');
  renderLiftGrid('lift-grid-target','target');
  updateTotals();
}
function renderLiftGrid(id,type){
  const g=document.getElementById(id);
  g.innerHTML='';
  ['SQ','BP','DL','OHP'].forEach(lift=>{
    const lb=lifts[type][lift];
    const pct=type==='target'&&lifts.current[lift]&&lifts.target[lift]
      ?Math.min(100,(lifts.current[lift]/lifts.target[lift])*100):null;
    const div=document.createElement('div');
    div.className='lift-card';div.dataset.lift=lift;
    div.innerHTML=`
      <div class="lift-name">${lift}</div>
      <div class="lift-val-row">
        <input class="lift-input" type="number" step="0.5"
          value="${lb?toDisplay(lb).toFixed(1):''}" placeholder="—"
          data-lift="${lift}" data-type="${type}"/>
        <span class="lift-unit-label">${displayUnit}</span>
      </div>
      <div class="lift-alt" id="alt-${type}-${lift}">${lb?(displayUnit==='lb'?'≈ '+(lb/KG2LB).toFixed(1)+' kg':'≈ '+(lb*KG2LB).toFixed(1)+' lb'):'&nbsp;'}</div>
      ${pct!==null?`<div class="lift-bar"><div class="lift-bar-fill" style="width:${pct}%"></div></div><div class="lift-pct">${pct.toFixed(0)}% of target</div>`:''}
    `;
    div.querySelector('.lift-input').addEventListener('input',e=>{
      const lb2=parseAsLb(e.target.value);
      lifts[type][lift]=lb2;
      const alt=document.getElementById(`alt-${type}-${lift}`);
      if(alt)alt.textContent=lb2?(displayUnit==='lb'?'≈ '+(lb2/KG2LB).toFixed(1)+' kg':'≈ '+(lb2*KG2LB).toFixed(1)+' lb'):'';
      updateTotals();
    });
    g.appendChild(div);
  });
}
function updateTotals(){
  const cur=['SQ','BP','DL'].reduce((s,l)=>s+(lifts.current[l]||0),0);
  const tgt=['SQ','BP','DL'].reduce((s,l)=>s+(lifts.target[l]||0),0);
  document.getElementById('current-total').textContent=cur?fmt(cur,0):'—';
  document.getElementById('target-total').textContent=tgt?fmt(tgt,0):'—';
  document.getElementById('dots-val').textContent=lifts.dots?lifts.dots.toFixed(2):'—';
}

// ═══════════════════════════════════════
// RPE PAGE
// ═══════════════════════════════════════
function renderRPETable(){
  const t=document.getElementById('rpe-tbl');
  let h='<thead><tr><th>RPE</th>';
  for(let r=1;r<=10;r++)h+=`<th>${r}R</th>`;
  h+='</tr></thead><tbody>';
  RPE_ROWS.forEach(rpe=>{
    h+=`<tr><td>${rpe}</td>`;
    RPE_SCALE[rpe].forEach(f=>h+=`<td>${(f*100).toFixed(1)}</td>`);
    h+='</tr>';
  });
  t.innerHTML=h+'</tbody>';
}
function updateCalc(){
  const orm=parseFloat(document.getElementById('calc-1rm').value);
  const rpe=document.getElementById('calc-rpe').value;
  const reps=document.getElementById('calc-reps').value;
  document.getElementById('calc-res-unit').textContent=displayUnit;
  if(!orm){document.getElementById('calc-res').textContent='—';return;}
  const f=rpeFactor(rpe,reps);
  const lb=orm*(displayUnit==='lb'?1:KG2LB)*f;
  document.getElementById('calc-res').textContent=fmt(lb,1).split(' ')[0];
}

// ═══════════════════════════════════════
// PROGRAM PAGE
// ═══════════════════════════════════════
function makeDefWeek(n){
  return{label:`Week ${n}`,date:'',done:false,days:DAY_NAMES.map(name=>({
    name,date:'',done:false,media:[],
    exercises:[0,1,2,3,4].map(()=>({workout:'',rpe:'',tempo:'',sets:'',reps:'',done:false}))
  }))};
}
function renderProgram(){
  document.getElementById('prog-title').value=programData.title;
  const c=document.getElementById('weeks-container');
  c.innerHTML='';
  programData.weeks.forEach((w,wi)=>renderWeek(w,wi,c));
}
function renderWeek(week,wi,c){
  const block=document.createElement('div');
  block.className='week-block';

  // Header
  const hdr=document.createElement('div');
  hdr.className='week-header';
  hdr.innerHTML=`
    <span class="week-label">Week ${wi+1}</span>
    <input type="date" class="week-date" value="${week.date||''}" title="Week start"/>
    <button class="mini-btn" data-wi="${wi}" data-a="add-day">+ Day</button>
    <button class="mini-btn danger" data-wi="${wi}" data-a="rem-day">− Day</button>
    <div class="check-btn ${week.done?`checked`:``}" data-wi="${wi}" data-a="week-done">${week.done?`✓`:``}</div>
  `;
  hdr.querySelector('.week-date').addEventListener('change',e=>programData.weeks[wi].date=e.target.value);
  hdr.querySelectorAll('[data-a]').forEach(el=>{
    el.addEventListener('click',()=>{
      const a=el.dataset.a;
      if(a==='week-done'){programData.weeks[wi].done=!programData.weeks[wi].done;renderProgram();}
      else if(a==='add-day'){programData.weeks[wi].days.push({name:`Day ${programData.weeks[wi].days.length+1}`,date:'',done:false,media:[],exercises:[0,1,2,3,4].map(()=>({workout:'',rpe:'',tempo:'',sets:'',reps:'',done:false}))});renderProgram();}
      else if(a==='rem-day'){if(programData.weeks[wi].days.length>1){programData.weeks[wi].days.pop();renderProgram();}}
    });
  });
  block.appendChild(hdr);

  week.days.forEach((day,di)=>renderDay(day,wi,di,block));
  c.appendChild(block);
}
function renderDay(day,wi,di,block){
  const card=document.createElement('div');
  card.className='day-card';

  const hdr=document.createElement('div');
  hdr.className='day-header';
  hdr.innerHTML=`
    <span class="day-label">${day.name}</span>
    <input type="date" class="day-date" value="${day.date||''}"/>
    <button class="cam-btn" title="Attach photo/video">📷</button>
    <div class="check-btn ${day.done?`checked`:``}">${day.done?`✓`:``}</div>
  `;
  hdr.querySelector('.day-date').addEventListener('change',e=>programData.weeks[wi].days[di].date=e.target.value);
  hdr.querySelector('.cam-btn').addEventListener('click',()=>{activeMedia={wi,di};document.getElementById('media-input').click();});
  hdr.querySelector('.check-btn').addEventListener('click',function(){
    programData.weeks[wi].days[di].done=!programData.weeks[wi].days[di].done;
    this.classList.toggle('checked',programData.weeks[wi].days[di].done);
    this.textContent=programData.weeks[wi].days[di].done?'✓':'';
  });
  card.appendChild(hdr);

  // Media
  if(day.media?.length){
    const strip=document.createElement('div');strip.className='media-strip';
    day.media.forEach(m=>{
      const img=document.createElement('img');img.className='media-thumb';img.src=m.dataUrl;
      img.addEventListener('click',()=>window.open(m.dataUrl));
      strip.appendChild(img);
    });
    card.appendChild(strip);
  }

  // Table
  const scroll=document.createElement('div');scroll.className='ex-scroll';
  const tbl=document.createElement('table');tbl.className='ex-table';
  tbl.innerHTML=`<thead><tr>
    <th style="width:24px"></th>
    <th>Exercise</th>
    <th class="c" style="width:46px">RPE</th>
    <th class="c" style="width:46px">Tempo</th>
    <th class="c" style="width:38px">Sets</th>
    <th class="c" style="width:38px">Reps</th>
    <th class="c" style="width:68px">Weight</th>
    <th class="c" style="width:28px">✓</th>
    <th class="c" style="width:28px"></th>
  </tr></thead>`;
  const tbody=document.createElement('tbody');
  day.exercises.forEach((ex,ei)=>tbody.appendChild(makeExRow(ex,wi,di,ei,tbody)));
  tbl.appendChild(tbody);scroll.appendChild(tbl);card.appendChild(scroll);

  // Add ex btn
  const addBtn=document.createElement('button');addBtn.className='add-ex-btn';addBtn.textContent='+ Add exercise';
  addBtn.addEventListener('click',()=>{
    const newEx={workout:'',rpe:'',tempo:'',sets:'',reps:'',done:false};
    programData.weeks[wi].days[di].exercises.push(newEx);
    tbody.appendChild(makeExRow(newEx,wi,di,programData.weeks[wi].days[di].exercises.length-1,tbody));
  });
  card.appendChild(addBtn);
  block.appendChild(card);
}
function makeExRow(ex,wi,di,ei,tbody){
  const tr=document.createElement('tr');
  tr.innerHTML=`
    <td class="row-num">${ei+1}</td>
    <td class="ac-wrap">
      <input class="ex-in" value="${ex.workout||''}" placeholder="Exercise"/>
      <div class="ac-list"></div>
    </td>
    <td><input class="ex-in mono" type="number" value="${ex.rpe||''}" placeholder="—" min="5" max="10" step="0.5" style="width:46px"/></td>
    <td><input class="ex-in mono" value="${ex.tempo||''}" placeholder="311" maxlength="3" style="width:46px"/></td>
    <td><input class="ex-in mono" type="number" value="${ex.sets||''}" placeholder="—" min="1" style="width:38px"/></td>
    <td><input class="ex-in mono" type="number" value="${ex.reps||''}" placeholder="—" min="1" style="width:38px"/></td>
    <td><div class="weight-val">—</div><div class="weight-alt"></div></td>
    <td><div class="check-btn ${ex.done?`checked`:``}" style="margin:0 auto">${ex.done?`✓`:``}</div></td>
    <td><button class="del-btn">✕</button></td>
  `;
  const [wIn,rpeIn,tempoIn,setsIn,repsIn]=tr.querySelectorAll('.ex-in');
  const wDisp=tr.querySelector('.weight-val');
  const wAlt=tr.querySelector('.weight-alt');
  const acList=tr.querySelector('.ac-list');
  let acSel=-1;

  function refreshWeight(){
    const lift=ex.workout?.toUpperCase().replace(' ','');
    const orm=lifts.current[lift]||lifts.current['SQ'];
    const lb=calcWeight(orm,ex.rpe,ex.reps,ex.tempo,ex.workout);
    if(lb){
      wDisp.textContent=fmt(lb,1);
      wAlt.textContent=displayUnit==='lb'?`${(lb/KG2LB).toFixed(1)} kg`:`${(lb*KG2LB).toFixed(1)} lb`;
    }else{wDisp.textContent='—';wAlt.textContent='';}
  }

  // Autocomplete
  wIn.addEventListener('input',()=>{
    ex.workout=wIn.value;
    const q=wIn.value.trim().toLowerCase();
    if(q.length<2){acList.style.display='none';return;}
    const matches=[...exerciseNames].filter(n=>n.toLowerCase().includes(q)).slice(0,8);
    if(!matches.length){acList.style.display='none';return;}
    acList.innerHTML='';acSel=-1;
    matches.forEach((name,i)=>{
      const item=document.createElement('div');item.className='ac-item';item.textContent=name;
      item.addEventListener('mousedown',e=>{
        e.preventDefault();wIn.value=name;ex.workout=name;exerciseNames.add(name);
        acList.style.display='none';refreshWeight();
      });
      acList.appendChild(item);
    });
    acList.style.display='block';
  });
  wIn.addEventListener('keydown',e=>{
    const items=acList.querySelectorAll('.ac-item');
    if(acList.style.display==='none'||!items.length)return;
    if(e.key==='ArrowDown'){e.preventDefault();acSel=Math.min(acSel+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('sel',i===acSel));}
    else if(e.key==='ArrowUp'){e.preventDefault();acSel=Math.max(acSel-1,0);items.forEach((el,i)=>el.classList.toggle('sel',i===acSel));}
    else if(e.key==='Tab'||e.key==='Enter'){
      if(acSel>=0){e.preventDefault();items[acSel].dispatchEvent(new MouseEvent('mousedown'));}
      else if(items.length){e.preventDefault();items[0].dispatchEvent(new MouseEvent('mousedown'));}
      acList.style.display='none';
    }
    else if(e.key==='Escape')acList.style.display='none';
  });
  wIn.addEventListener('blur',()=>setTimeout(()=>acList.style.display='none',150));

  rpeIn.addEventListener('input',()=>{ex.rpe=rpeIn.value;refreshWeight();});
  tempoIn.addEventListener('input',()=>{ex.tempo=tempoIn.value;refreshWeight();});
  setsIn.addEventListener('input',()=>ex.sets=setsIn.value);
  repsIn.addEventListener('input',()=>{ex.reps=repsIn.value;refreshWeight();});

  tr.querySelector('.check-btn').addEventListener('click',function(){
    ex.done=!ex.done;this.classList.toggle('checked',ex.done);this.textContent=ex.done?'✓':'';
  });
  tr.querySelector('.del-btn').addEventListener('click',()=>{
    programData.weeks[wi].days[di].exercises.splice(ei,1);
    tr.remove();
    tbody.querySelectorAll('tr').forEach((r,i)=>r.cells[0].textContent=i+1);
  });
  setTimeout(refreshWeight,0);
  return tr;
}

// ═══════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════
function renderHistory(){
  const list=document.getElementById('history-list');
  let sessions=[];
  try{sessions=JSON.parse(localStorage.getItem(HIST_KEY))||[];}catch{}
  if(!sessions.length){
    list.innerHTML='<div style="text-align:center;color:var(--muted);padding:60px 0;font-size:13px;line-height:2">아직 기록이 없어요<br><span style="font-size:11px">Program에서 Save를 눌러보세요</span></div>';
    return;
  }
  list.innerHTML='';
  sessions.forEach(s=>{
    const d=document.createElement('div');d.className='hist-card';
    d.innerHTML=`
      <div class="hist-hdr">
        <div class="hist-title">${s.title||'Workout'}</div>
        <div class="hist-date">${s.savedAt||''}</div>
      </div>
      <div class="hist-chips">${(s.summary||[]).map(t=>`<span class="hist-chip">${t}</span>`).join('')}</div>
    `;
    list.appendChild(d);
  });
}
function saveToHistory(){
  let sessions=[];
  try{sessions=JSON.parse(localStorage.getItem(HIST_KEY))||[];}catch{}
  const summary=[];
  programData.weeks.forEach(w=>w.days.forEach(d=>d.exercises.filter(e=>e.done&&e.workout).forEach(e=>{
    summary.push(`${e.workout} ${e.sets||'?'}×${e.reps||'?'}@${e.rpe||'?'}`);
  })));
  sessions.unshift({title:programData.title,savedAt:new Date().toLocaleString('ko-KR'),summary:summary.slice(0,10)});
  localStorage.setItem(HIST_KEY,JSON.stringify(sessions.slice(0,60)));
}

// ═══════════════════════════════════════
// MEDIA
// ═══════════════════════════════════════
document.getElementById('media-input').addEventListener('change',function(){
  if(!activeMedia||!this.files.length)return;
  const{wi,di}=activeMedia;
  Array.from(this.files).forEach(file=>{
    const r=new FileReader();
    r.onload=e=>{
      programData.weeks[wi].days[di].media.push({type:file.type.startsWith('video')?'video':'image',dataUrl:e.target.result,name:file.name});
      renderProgram();showToast('📷 첨부 완료');
    };
    r.readAsDataURL(file);
  });
  this.value='';
});

// ═══════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════
document.querySelectorAll('.nav-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('page-'+tab.dataset.page).classList.add('active');
    if(tab.dataset.page==='history')renderHistory();
    if(tab.dataset.page==='rpe'){renderRPETable();updateCalc();}
  });
});
document.querySelectorAll('.unit-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{displayUnit=btn.dataset.unit;renderStats();renderProgram();updateCalc();});
});
document.getElementById('bw-input').addEventListener('input',e=>lifts.bw=parseAsLb(e.target.value));
document.getElementById('prog-title').addEventListener('input',e=>programData.title=e.target.value);
document.getElementById('btn-add-week').addEventListener('click',()=>{
  programData.weeks.push(makeDefWeek(programData.weeks.length+1));
  renderProgram();showToast(`Week ${programData.weeks.length} 추가`);
});
document.getElementById('btn-minus-week').addEventListener('click',()=>{
  if(!programData.weeks.length)return;
  programData.weeks.pop();renderProgram();showToast('Week 삭제');
});
['calc-1rm','calc-rpe','calc-reps'].forEach(id=>document.getElementById(id).addEventListener('input',updateCalc));
document.getElementById('fab').addEventListener('click',()=>{
  programData.weeks.forEach(w=>w.days.forEach(d=>d.exercises.forEach(e=>{if(e.workout)exerciseNames.add(e.workout);})));
  saveAll();saveToHistory();showToast('저장 완료 ✓');
});
document.getElementById('btn-clear-hist').addEventListener('click',()=>{
  if(!confirm('모든 기록 삭제?'))return;
  localStorage.removeItem(HIST_KEY);renderHistory();
});

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
let toastT;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

// ═══════════════════════════════════════
// BOOT
// ═══════════════════════════════════════
loadAll();
renderStats();
if(!programData.weeks.length)programData.weeks.push(makeDefWeek(1));
renderProgram();
</script>
</body>
</html>
